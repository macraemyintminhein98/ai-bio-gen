<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Bio Generator</title><meta name="description" content="Generate creative Instagram bios with AI."><style>body{font-family:sans-serif;margin:0;display:flex;flex-direction:column;align-items:center;padding:20px;background-color:#f8faff;color:#333}h1{color:#1a2b4b;margin-bottom:10px}p{max-width:600px;text-align:center;line-height:1.6}form{background:#fff;padding:30px;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,.1);display:flex;flex-direction:column;gap:15px;width:100%;max-width:500px}label{font-weight:bold;color:#4a5b7c}input[type="text"],select,textarea{width:calc(100% - 20px);padding:10px;border:1px solid #ddd;border-radius:5px;font-size:1em}textarea{resize:vertical;min-height:80px}button{background-color:#007bff;color:#fff;padding:12px 20px;border:none;border-radius:5px;cursor:pointer;font-size:1.1em;font-weight:bold;transition:background-color .3s}.output-box{background:#e9f5ff;border:1px solid #cce0ff;padding:20px;border-radius:8px;margin-top:20px;max-width:500px;width:100%;word-wrap:break-word;white-space:pre-wrap;font-family:monospace}.price{font-size:1.5em;font-weight:bold;color:#28a745;margin-top:15px;}</style></head><body><h1>AI Bio Generator</h1><p>Craft the perfect Instagram bio with artificial intelligence. Just tell us about yourself and your desired vibe!</p><form id="bioForm"><label for="keywords">Keywords (e.g., 'travel, photography, foodie'):</label><input type="text" id="keywords" placeholder="adventure, tech, coffee" required><label for="tone">Desired Tone:</label><select id="tone"><option value="witty">Witty</option><option value="professional">Professional</option><option value="inspirational">Inspirational</option><option value="creative">Creative</option><option value="playful">Playful</option></select><label for="extra">Anything else we should know?</label><textarea id="extra" placeholder="Looking for something short and catchy."></textarea><span class="price">Only $4.99 per bio!</span><button type="submit">Generate Bio</button></form><div id="output" class="output-box" style="display:none;">Your AI-Generated Bio will appear here.</div><script>document.getElementById('bioForm').addEventListener('submit', async (e) => { e.preventDefault(); const keywords = document.getElementById('keywords').value; const tone = document.getElementById('tone').value; const extra = document.getElementById('extra').value; const outputDiv = document.getElementById('output'); outputDiv.style.display = 'block'; outputDiv.textContent = 'Generating your bio...'; try { const response = await fetch('/api/generate-bio', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ keywords, tone, extra }) }); const data = await response.json(); if (data.bio) { outputDiv.textContent = data.bio; } else { outputDiv.textContent = 'Error: ' + (data.error || 'Could not generate bio.'); } } catch (error) { outputDiv.textContent = 'Network Error: ' + error.message; }});</script></body></html>
