<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Bio Gen</title><meta name="description" content="Generate catchy Instagram bios instantly."><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css"><style>body{display:flex;flex-direction:column;min-height:100vh;}main{flex:1;}footer{margin-top:auto;}header,main,footer{max-width:800px;margin:auto;padding:1rem;}form{display:flex;flex-direction:column;gap:1rem;}.response-box{white-space:pre-wrap;background-color:var(--pico-background-color);padding:1rem;border-radius:var(--pico-border-radius);border:1px solid var(--pico-form-element-border-color);}@media(min-width:600px){.grid-wrapper{display:grid;grid-template-columns:1fr 1fr;gap:2rem;}}</style></head><body><header><h1>AI Bio Gen</h1><p>Craft your perfect Instagram bio in seconds.</p></header><main><article><section><form id="bio-form"><label for="keywords">Keywords/Themes:</label><input type="text" id="keywords" name="keywords" placeholder="e.g., travel, foodie, entrepreneur" required><label for="style">Style/Tone:</label><select id="style" name="style"><option value="witty">Witty</option><option value="professional">Professional</option><option value="creative">Creative</option><option value="inspirational">Inspirational</option></select><label for="emojis">Emojis:</label><input type="text" id="emojis" name="emojis" placeholder="e.g., ✨✈️ (Optional)"><button type="submit">Generate Bio</button></form><div class="response-box" id="bio-output">Your generated bio will appear here...</div><p><small>Get unlimited bio generations for just $4.99 and elevate your Instagram presence!</small></p><button id="checkout-button" onclick="window.location.href='https://buy.stripe.com/test_dR6g2S0F32h47S4bIJ'">Get Unlimited Bios</button></section></article></main><footer><small>&#169; 2023 AI Bio Gen. All rights reserved.</small></footer><script>document.getElementById('bio-form').addEventListener('submit', async (e) => { e.preventDefault(); const keywords = document.getElementById('keywords').value; const style = document.getElementById('style').value; const emojis = document.getElementById('emojis').value; const outputDiv = document.getElementById('bio-output'); outputDiv.textContent = 'Generating...'; try { const response = await fetch('/api/generate-bio', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ keywords, style, emojis }) }); if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`); const data = await response.json(); outputDiv.textContent = data.bio; } catch (error) { console.error('Error generating bio:', error); outputDiv.textContent = 'Error generating bio. Please try again.'; }});</script></body></html>
